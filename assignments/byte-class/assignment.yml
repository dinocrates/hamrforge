title: Assignment 5 - Byte Class
slug: byte-class
language: cpp
standard: c++17
compiler: g++
max_score: 100

submission:
  required_files:
    - main.cpp
    - Byte.h
    - Byte.cpp
  accepted_extensions:
    - .cpp
    - .h
    - .hpp
    - .zip
  ignored_paths:
    - .vs
    - Debug
    - Release
    - x64
    - __MACOSX

checks:
  - name: Required files
    type: file_check
    points: 10

  - name: Compiles
    type: compile
    points: 20

  - name: Constructor stores value
    type: expression_test
    points: 15
    include:
      - Byte.h
    setup: |
      Byte b(13);
    expect:
      expression: b.toInt()
      equals: 13

  - name: Addition operator works
    type: expression_test
    points: 15
    include:
      - Byte.h
    setup: |
      Byte a(5);
      Byte b(7);
      Byte c = a + b;
    expect:
      expression: c.toInt()
      equals: 12

  - name: Edge case addition
    type: expression_test
    points: 20
    include:
      - Byte.h
    setup: |
      Byte a(128);
      Byte b(1);
      Byte c = a + b;
    expect:
      expression: c.toInt()
      equals: 129

  - name: Menu accepts user input
    type: console_io
    points: 20
    input: |
      1
      5
      7
      0
    expected_contains:
      - "12"
