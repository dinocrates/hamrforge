title: Unit 02 - Byte Class Construction
slug: byte-class
language: cpp
standard: c++17
compiler: g++
max_score: 40
runner: local_unsafe

submission:
  required_files:
    - main.cpp
    - Byte.h
    - Byte.cpp
  accepted_extensions:
    - .cpp
    - .h
    - .hpp
    - .zip
  ignored_paths:
    - .vs
    - Debug
    - Release
    - x64
    - __MACOSX

checks:
  - name: Required files
    type: file_check
    points: 12

  - name: Compiles
    type: compile
    points: 6

  - name: setValue stores integer value
    type: expression_test
    points: 3
    include:
      - Byte.h
    setup: |
      Byte b;
      b.setValue(99);
    expect:
      expression: b.toInt()
      equals: 99

  - name: at returns expected bits
    type: expression_test
    points: 3
    include:
      - Byte.h
    setup: |
      Byte b;
      b.setValue(99);
    expect:
      expression: b.at(0) == 1 && b.at(1) == 1 && b.at(2) == 0 && b.at(3) == 0 && b.at(4) == 0 && b.at(5) == 1 && b.at(6) == 1 && b.at(7) == 0
      equals: true

  - name: toString returns reversed bit string
    type: expression_test
    points: 2
    include:
      - Byte.h
    setup: |
      Byte b;
      b.setValue(99);
    expect:
      expression: b.toString()
      equals: "01100011"

  - name: Boundary value 255 works
    type: expression_test
    points: 2
    include:
      - Byte.h
    setup: |
      Byte b;
      b.setValue(255);
    expect:
      expression: b.toInt() == 255 && b.toString() == "11111111"
      equals: true

  - name: Program runs to completion
    type: console_io
    points: 12
    input: ""
    expected_contains: []
