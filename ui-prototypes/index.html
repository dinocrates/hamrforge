<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HamrForge Prototype Login</title>
  <link rel="stylesheet" href="prototype.css">
</head>
<body class="login-page">
  <main class="login-box">
    <div class="titlebar">HamrForge Prototype</div>
    <section class="content">
      <div class="login-mark">HAMRFORGE</div>
      <h1>Open Lab Preview</h1>
      <p class="muted">This is fake sign in for testing the look and flow. Any values move forward.</p>
      <form class="form-stack" action="student-courses.html">
        <label>
          Username
          <input name="username" value="demo-student">
        </label>
        <label>
          Password
          <input name="password" type="password" value="password">
        </label>
        <div class="actions">
          <button class="primary" type="submit">Enter as Student</button>
          <a class="button" href="instructor-courses.html">Preview Instructor</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
